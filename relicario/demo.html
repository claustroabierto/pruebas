<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Relicario · marcador RA (demo)</title>
<style>:root{font-family:system-ui,sans-serif}*{box-sizing:border-box;margin:0}
html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
#hint{position:fixed;left:0;right:0;bottom:0;z-index:5;text-align:center;padding:14px;font-size:13px;opacity:.8;background:linear-gradient(#0000,#000c);pointer-events:none}
#hint b{color:#c9a24b}
.sec{position:fixed;right:12px;bottom:52px;z-index:5}
.sec button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;border-radius:999px;padding:8px 12px;font-size:12px}</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head><body>
<canvas id="c"></canvas>
<div class="sec"><button id="btn-re">↻ Repetir</button><button id="btn-lado">Ver de lado</button></div>
<div id="hint">Así se ve al escanear el <b>marcador RA</b>: el relicario sale del marcador y flota</div>
<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG=window.MUSEO_CONFIG;
const clamp01=v=>Math.min(1,Math.max(0,v));
const step=(a,b,t)=>{const x=clamp01((t-a)/(b-a));return x*x*(3-2*x);};
const lerp=(a,b,t)=>a+(b-a)*t;
const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();const D0=2.2;
const camera=new THREE.PerspectiveCamera(42,1,0.01,100);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener("resize",resize);resize();
const loader=new THREE.TextureLoader();const tx=s=>{const t=loader.load(s);t.colorSpace=THREE.SRGBColorSpace;return t;};
// marcador de fondo
const MW=1, MH=1/0.75;
const marc=new THREE.Mesh(new THREE.PlaneGeometry(MW,MH),new THREE.MeshBasicMaterial({map:tx(CFG.targetPreview),depthTest:false,depthWrite:false}));
marc.renderOrder=0;scene.add(marc);
// objeto que sale
const o=CFG.objeto, H=o.size/o.aspect;
const mat=new THREE.MeshBasicMaterial({map:tx(o.src),transparent:true,opacity:0,depthTest:false,depthWrite:false});
const mesh=new THREE.Mesh(new THREE.PlaneGeometry(o.size,H),mat);mesh.renderOrder=5;scene.add(mesh);
function makeShadow(){const s=64,cv=document.createElement("canvas");cv.width=cv.height=s;const g=cv.getContext("2d");
 const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,"rgba(0,0,0,0.5)");gr.addColorStop(1,"rgba(0,0,0,0)");
 g.fillStyle=gr;g.fillRect(0,0,s,s);return new THREE.CanvasTexture(cv);}
const shadow=new THREE.Mesh(new THREE.PlaneGeometry(o.size*0.7,o.size*0.21),new THREE.MeshBasicMaterial({map:makeShadow(),transparent:true,opacity:0,depthTest:false,depthWrite:false}));
shadow.renderOrder=4;scene.add(shadow);
let startT=0,lookSide=false,sideMix=0;const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{const now=clock.getElapsedTime(),t=now-startT;
 sideMix=lerp(sideMix,lookSide?1:0,0.05);
 const appear=step(0,0.7,t),rise=step(0.2,1.2,t);
 const bob=Math.sin(now*1.1)*0.02*appear, sway=Math.sin(now*0.7)*0.08*appear;
 mat.opacity=appear;mesh.position.set(0,bob+rise*0.03,0.12+rise*0.10);mesh.rotation.y=sway;mesh.scale.setScalar(lerp(0.6,1,appear));
 shadow.material.opacity=appear*0.5;shadow.position.set(0,-H*0.52+bob*0.5,0.02);
 const ang=sideMix*(Math.sin(now*0.5)*0.4);camera.position.set(Math.sin(ang)*D0,0,Math.cos(ang)*D0);camera.lookAt(0,0,0);
 renderer.render(scene,camera);});
document.getElementById("btn-re").addEventListener("click",()=>startT=clock.getElapsedTime());
document.getElementById("btn-lado").addEventListener("click",e=>{lookSide=!lookSide;e.target.textContent=lookSide?"Ver de frente":"Ver de lado";});
</script></body></html>
