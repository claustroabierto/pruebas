<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Bichos · opciones de animación</title>
<style>
  :root{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  *{box-sizing:border-box;margin:0}
  html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block}
  #ui{position:fixed;left:0;right:0;top:0;z-index:5;padding:12px 12px calc(12px + env(safe-area-inset-top));
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;background:linear-gradient(#000c,#0000);pointer-events:none}
  #ui button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;
    border-radius:999px;padding:9px 14px;font-size:13px;font-weight:600;backdrop-filter:blur(6px)}
  #ui button.on{background:#c9a24b;color:#1a1206;border-color:#c9a24b}
  #hint{position:fixed;left:0;right:0;bottom:0;z-index:5;text-align:center;
    padding:12px 16px calc(14px + env(safe-area-inset-bottom));font-size:12px;opacity:.8;
    background:linear-gradient(#0000,#000c);pointer-events:none}
  #hint b{color:#c9a24b}
  .sec{position:fixed;right:12px;bottom:52px;z-index:5;display:flex;gap:8px}
  .sec button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;border-radius:999px;padding:8px 12px;font-size:12px}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button data-m="revolotea">Revolotean</button>
  <button data-m="enjambre">Enjambre</button>
  <button data-m="despega">Despegan uno a uno</button>
  <button data-m="posado">Quietos (bordado)</button>
</div>
<div class="sec"><button id="btn-uv">Luz UV</button><button id="btn-lado">Ver de lado</button></div>
<div id="hint">Modo: <b id="modo">revolotean</b> · los bordados del mantón cobran vida y vuelan · toca las opciones para comparar</div>

<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG=window.MUSEO_CONFIG;
const clamp01=v=>Math.min(1,Math.max(0,v));
const smooth=(a,b,t)=>{const x=clamp01((t-a)/(b-a));return x*x*(3-2*x);};
const lerp=(a,b,t)=>a+(b-a)*t;

const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const D0=2.0;
const camera=new THREE.PerspectiveCamera(42,1,0.01,100);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener("resize",resize);resize();

const loader=new THREE.TextureLoader();
const tex=s=>{const t=loader.load(s);t.colorSpace=THREE.SRGBColorSpace;return t;};
// Fondo: el mantón
const MW=1, MH=1/CFG.aspect;
const manton=new THREE.Mesh(new THREE.PlaneGeometry(MW,MH),
  new THREE.MeshBasicMaterial({map:tex(CFG.fondo),depthTest:false,depthWrite:false}));
manton.renderOrder=0;scene.add(manton);

// Bichos
const bichos=CFG.bichos.map((b,i)=>{
  const mat=new THREE.MeshBasicMaterial({map:tex(b.src),transparent:true,depthTest:false,depthWrite:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,1),mat);
  mesh.renderOrder=2+i;scene.add(mesh);
  return {...b,mesh,mat,ph:i*1.7,fx:0.33+i*0.028,fy:0.26+i*0.022,cur:null};
});

// Medallón UV (revelado): overlay sobre el medallón central del mantón
let uvMesh=null, uvOn=false, uvMix=0;
if(CFG.medallonUV){const u=CFG.medallonUV;
  const mat=new THREE.MeshBasicMaterial({map:tex(u.src),transparent:true,opacity:0,depthTest:false,depthWrite:false});
  uvMesh=new THREE.Mesh(new THREE.PlaneGeometry(u.size*u.aspect,u.size),mat);
  uvMesh.position.set(u.x,u.y,0.01);uvMesh.renderOrder=1;scene.add(uvMesh);
  window.__setUV=(x,y,s)=>{uvMesh.position.set(x,y,0.01);uvMesh.geometry.dispose();uvMesh.geometry=new THREE.PlaneGeometry(s*u.aspect,s);};
}

let mode="revolotea", modeStart=0, lookSide=false, sideMix=0;
const clock=new THREE.Clock();

function target(b,i,now,mt){
  let fly=0, ampMul=1;
  if(mode==="posado") fly=0;
  else if(mode==="revolotea"){fly=1;ampMul=0.42;}
  else if(mode==="enjambre"){fly=1;ampMul=1.0;}
  else if(mode==="despega"){fly=smooth(i*0.5,i*0.5+1.4,mt);ampMul=0.7;}
  const amp=b.spread*ampMul;
  const ox=Math.sin(now*b.fx+b.ph)*amp*fly;
  const oy=Math.sin(now*b.fy+b.ph*1.3)*amp*0.55*fly + Math.sin(now*1.1+b.ph)*0.012*fly;
  const flapv=Math.sin(now*b.flap+b.ph);
  const sy=b.size*(1+flapv*0.14*(0.35+0.65*fly));   // aleteo (más al volar)
  const sx=b.size*b.aspect;
  const rot=Math.sin(now*0.6+b.ph)*0.18*fly + flapv*0.025;
  const z=0.02+fly*(0.05+0.03*Math.sin(now*b.fx+b.ph));
  return {x:b.x+ox,y:b.y+oy,z,sx,sy,rot};
}

renderer.setAnimationLoop(()=>{
  const now=clock.getElapsedTime(), mt=now-modeStart;
  sideMix=lerp(sideMix,lookSide?1:0,0.05);
  for(let i=0;i<bichos.length;i++){const b=bichos[i];const t=target(b,i,now,mt);
    if(!b.cur)b.cur={...t};
    for(const k of ["x","y","z","sx","sy","rot"]) b.cur[k]=lerp(b.cur[k],t[k],0.14);
    b.mesh.position.set(b.cur.x,b.cur.y,b.cur.z);
    b.mesh.scale.set(b.cur.sx,b.cur.sy,1);
    b.mesh.rotation.z=b.cur.rot;
  }
  if(uvMesh){uvMix=lerp(uvMix,uvOn?1:0,0.08);uvMesh.material.opacity=uvMix;}
  const ang=sideMix*(Math.sin(now*0.5)*0.4);
  camera.position.set(Math.sin(ang)*D0,0,Math.cos(ang)*D0);camera.lookAt(0,0,0);
  renderer.render(scene,camera);
});

const btns=[...document.querySelectorAll("#ui button")];
function setMode(m){mode=m;modeStart=clock.getElapsedTime();
  document.getElementById("modo").textContent={revolotea:"revolotean",enjambre:"enjambre",despega:"despegan uno a uno",posado:"quietos"}[m];
  btns.forEach(b=>b.classList.toggle("on",b.dataset.m===m));}
btns.forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.m)));
setMode("revolotea");
document.getElementById("btn-lado").addEventListener("click",e=>{lookSide=!lookSide;e.target.textContent=lookSide?"Ver de frente":"Ver de lado";});
document.getElementById("btn-uv").addEventListener("click",e=>{uvOn=!uvOn;e.target.classList.toggle("on",uvOn);});
</script>
</body>
</html>
