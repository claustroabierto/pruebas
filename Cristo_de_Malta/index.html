<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>RA · Cristo de Malta — Museo Ayacucho</title>
  <link rel="stylesheet" href="../shared/styles.css?v=7" />
  <style>
    /* Malta no usa slider ni tarjeta de pigmento: el panel solo lleva el
       subtítulo narrativo y el botón de repetir. */
    /* Cartel claro con título negro + descripción (pedido del equipo: labels en
       negro, se leen mejor que el gris). */
    #label-card{background:#f4efe6ee;color:#1a1206;border-radius:12px;padding:11px 14px;
      margin-bottom:10px;box-shadow:0 4px 16px #0007;transition:opacity .3s;}
    #label-titulo{font-size:17px;font-weight:800;letter-spacing:.2px;}
    #label-desc{font-size:12.5px;line-height:1.4;margin-top:3px;color:#3a2f22;}
    #label-hint{font-size:11px;color:#7a6a55;margin-top:6px;}
    #panel .row{justify-content:flex-end;}
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="ar"></div>

  <div id="topbar">
    <div id="titulo">…</div>
    <div id="subtitulo"></div>
  </div>

  <div id="scan">
    <div class="frame"></div>
    <p>Apunta la cámara al <b>Cristo de Malta</b> y mantén la obra encuadrada.</p>
  </div>

  <div id="panel">
    <div id="label-card">
      <div id="label-titulo">…</div>
      <div id="label-desc"></div>
      <div id="label-hint"></div>
    </div>
    <div class="row">
      <button id="btn-toggle">↻ Repetir</button>
    </div>
    <div id="ficha-txt"></div>
  </div>

  <div id="loading">
    <div class="centro">
      <div class="sello">RA</div>
      <div class="expo">Un claustro abierto al mundo a través del arte</div>
      <div class="sede">Monasterio de Carmelitas Descalzas de Santa Teresa · Ayacucho</div>
      <div class="barra"><i></i></div>
      <div class="estado">Preparando la realidad aumentada…</div>
    </div>
    <div class="creditos">
      <img class="l-carmelitas" src="../shared/logos/carmelitas.webp" width="170" height="210"
           alt="Monasterio de Carmelitas Descalzas de Santa Teresa" />
      <img class="l-utec" src="../shared/logos/utec.webp" width="555" height="126"
           alt="UTEC · Centro de Investigación y Conservación del Patrimonio" />
      <img class="l-embajada" src="../shared/logos/embajada.webp" width="303" height="114"
           alt="Embajada de los Estados Unidos de América en Lima" />
    </div>
  </div>
  <div id="error"></div>

  <script src="config.js?v=3"></script>
  <script type="module" src="malta-engine.js?v=4"></script>
</body>
</html>
