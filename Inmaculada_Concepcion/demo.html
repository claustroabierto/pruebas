<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Inmaculada · revelado uno por uno (demo)</title>
<style>:root{font-family:system-ui,sans-serif}*{box-sizing:border-box;margin:0}
html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
#hint{position:fixed;left:0;right:0;bottom:0;z-index:5;text-align:center;padding:12px 16px;font-size:13px;opacity:.85;background:linear-gradient(#0000,#000c);pointer-events:none}
#hint b{color:#c9a24b}
.sec{position:fixed;right:12px;bottom:48px;z-index:5;display:flex;gap:8px}
.sec button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;border-radius:999px;padding:8px 13px;font-size:12px}</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head><body>
<canvas id="c"></canvas>
<div class="sec"><button id="btn-re">↻ Repetir</button></div>
<div id="hint">Las microscopías aparecen <b>una por una</b>, cada una con una flecha al punto del pigmento</div>
<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG=window.MUSEO_CONFIG;
const clamp01=v=>Math.min(1,Math.max(0,v));
const step=(a,b,t)=>{const x=clamp01((t-a)/(b-a));return x*x*(3-2*x);};
const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,1,0.01,100);
// encuadrar todo el overlay (1.583 de ancho, con las etiquetas laterales) según
// el aspect de la pantalla: alejamos la cámara lo necesario + margen.
function resize(){
  renderer.setSize(innerWidth,innerHeight);const a=innerWidth/innerHeight;
  camera.aspect=a;camera.updateProjectionMatrix();
  const need=2.05;                                   // ancho/alto a mostrar (overlay + margen para las etiquetas)
  const halfV=Math.tan(THREE.MathUtils.degToRad(40)/2);
  const dz=(a>=1? need/2/(halfV*a) : need/2/halfV);  // distancia para que quepa el lado limitante
  camera.position.set(0,0,Math.max(2.2,dz));camera.lookAt(0,0,0);
}
addEventListener("resize",resize);resize();
const loader=new THREE.TextureLoader();const tx=s=>{const t=loader.load(s);t.colorSpace=THREE.SRGBColorSpace;return t;};
// pintura de fondo (ancho 1, alto 1.412)
const PW=1, PH=1.412;
const pintura=new THREE.Mesh(new THREE.PlaneGeometry(PW,PH),new THREE.MeshBasicMaterial({map:tx(CFG.targetPreview),depthTest:false,depthWrite:false}));
pintura.renderOrder=0;scene.add(pintura);
const OV=CFG.overlay;
// Cada reveal (850x850, con su microscopía+etiqueta+flecha ya dibujada) se
// superpone alineado sobre la pintura y aparece en su turno (uno por uno).
const items=CFG.reveals.map((src,i)=>{
  const mat=new THREE.MeshBasicMaterial({map:tx(src),transparent:true,opacity:0,depthTest:false,depthWrite:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(OV.width,OV.height),mat);
  mesh.position.set(OV.offsetX,OV.offsetY,0.01+i*0.001);mesh.renderOrder=2+i;scene.add(mesh);
  return {mat};
});
let startT=0;const clock=new THREE.Clock();
const INTER=CFG.intervaloReveal||0.8;
renderer.setAnimationLoop(()=>{
  const t=clock.getElapsedTime()-startT;
  for(let i=0;i<items.length;i++) items[i].mat.opacity=step(0.4+i*INTER,0.4+i*INTER+0.55,t);
  renderer.render(scene,camera);
});
document.getElementById("btn-re").addEventListener("click",()=>startT=clock.getElapsedTime());
</script>
</body></html>
