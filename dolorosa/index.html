<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>RA · Virgen Dolorosa — Museo Ayacucho</title>
  <link rel="stylesheet" href="../shared/styles.css?v=8" />
  <style>
    /* Dolorosa no usa slider ni tarjeta: el panel lleva el texto narrativo y
       los dos controles (velas / repetir). */
    #caption{font-size:13px;line-height:1.4;min-height:1.4em;margin-bottom:10px;
      text-shadow:0 1px 6px #000a;}
    #panel .row{justify-content:flex-end;gap:8px;}
    #panel .row button{background:var(--gold);color:#1a1206;border:0;border-radius:10px;
      padding:10px 14px;font-weight:700;font-size:13px;}
    #btn-repeat{background:#ffffff26;color:var(--ink);}
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="ar"></div>

  <div id="topbar">
    <div id="titulo">…</div>
    <div id="subtitulo"></div>
  </div>

  <div id="scan">
    <div class="frame"></div>
    <p>Apunta la cámara a <b>la Virgen Dolorosa</b> y mantén la obra encuadrada.</p>
  </div>

  <div id="panel">
    <div id="caption"></div>
    <div class="row">
      <button id="btn-repeat">↻ Repetir</button>
      <button id="btn-velas">Apagar velas</button>
    </div>
    <div id="ficha-txt"></div>
  </div>

  <div id="loading">
    <div class="centro">
      <div class="sello">RA</div>
      <div class="expo">Un claustro abierto al mundo a través del arte</div>
      <div class="sede">Monasterio de Carmelitas Descalzas de Santa Teresa · Ayacucho</div>
      <div class="barra"><i></i></div>
      <div class="estado">Preparando la realidad aumentada…</div>
    </div>
    <div class="creditos">
      <img class="l-carmelitas" src="../shared/logos/carmelitas.webp" width="170" height="210"
           alt="Monasterio de Carmelitas Descalzas de Santa Teresa" />
      <img class="l-utec" src="../shared/logos/utec.webp" width="555" height="126"
           alt="UTEC · Centro de Investigación y Conservación del Patrimonio" />
      <img class="l-embajada" src="../shared/logos/embajada.webp" width="303" height="114"
           alt="Embajada de los Estados Unidos de América en Lima" />
    </div>
  </div>
  <div id="error"></div>

  <script src="config.js?v=15"></script>
  <script type="module" src="dolorosa-engine.js?v=14"></script>
</body>
</html>
