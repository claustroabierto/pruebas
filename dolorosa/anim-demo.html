<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Dolorosa · opciones de animación</title>
<style>
  :root{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
  *{box-sizing:border-box;margin:0}
  html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden}
  #c{position:fixed;inset:0;width:100%;height:100%;display:block}
  #ui{position:fixed;left:0;right:0;top:0;z-index:5;padding:12px 12px calc(12px + env(safe-area-inset-top));
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    background:linear-gradient(#000c,#0000);pointer-events:none}
  #ui button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;
    border-radius:999px;padding:9px 14px;font-size:13px;font-weight:600;backdrop-filter:blur(6px)}
  #ui button.on{background:#c9a24b;color:#1a1206;border-color:#c9a24b}
  #hint{position:fixed;left:0;right:0;bottom:0;z-index:5;text-align:center;
    padding:12px 16px calc(14px + env(safe-area-inset-bottom));font-size:12px;opacity:.75;
    background:linear-gradient(#0000,#000c);pointer-events:none}
  #hint b{color:#c9a24b}
  .sec{position:fixed;right:12px;bottom:56px;z-index:5;display:flex;gap:8px}
  .sec button{pointer-events:auto;background:#171320cc;color:#f4efe6;border:1px solid #ffffff22;
    border-radius:999px;padding:8px 12px;font-size:12px}
</style>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button data-m="diagonal">Diagonal (actual)</button>
  <button data-m="recta">Recta</button>
  <button data-m="recta_queda">Recta y se queda</button>
  <button data-m="flota">Flota</button>
  <button data-m="respira">Respira</button>
</div>
<div class="sec">
  <button id="btn-vela">Apagar velas</button>
  <button id="btn-lado">Ver de lado</button>
</div>
<div id="hint">Modo: <b id="modo">recta</b> · toca los botones de arriba para comparar cómo la Virgen "sale" del cuadro</div>

<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG=window.MUSEO_CONFIG;
const clamp01=v=>Math.min(1,Math.max(0,v));
const smooth=(a,b,t)=>{const x=clamp01((t-a)/(b-a));return x*x*(3-2*x);};
const lerp=(a,b,t)=>a+(b-a)*t;
const LIT=new THREE.Color(1.00,0.96,0.90), UNLIT=new THREE.Color(0.50,0.55,0.72);
const FLAME_VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
const FLAME_FRAG=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uSeed;uniform float uAlive;
float hash(float n){return fract(sin(n)*43758.5453123);}
float vnoise(float x){float i=floor(x),f=fract(x);return mix(hash(i),hash(i+1.0),f*f*(3.0-2.0*f));}
void main(){vec2 uv=vUv-vec2(0.5,0.42);float t=uTime+uSeed*10.0;
float sway=(vnoise(t*2.7)-0.5)*0.42;uv.x-=sway*clamp(uv.y+0.15,0.0,1.0);
float h=0.34+vnoise(t*4.3+5.0)*0.12;
float w=0.115*(1.0-clamp(uv.y/h,0.0,1.0))*(1.0-clamp(uv.y/h,0.0,1.0));
float side=1.0-smoothstep(0.0,max(w,0.001),abs(uv.x));
float vmask=smoothstep(-0.12,-0.04,uv.y)*(1.0-smoothstep(h*0.5,h,uv.y));
float body=side*vmask;
vec3 col=mix(vec3(1.0,0.98,0.75),vec3(1.0,0.55,0.12),smoothstep(-0.05,0.14,uv.y));
col=mix(col,vec3(1.0,0.28,0.06),smoothstep(0.12,0.30,uv.y));
float breathe=0.82+vnoise(t*7.0)*0.36;float a=body*breathe*uAlive;gl_FragColor=vec4(col*a,a);}`;

const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));
renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const D0=CFG.nominalDistance||2.0;
const camera=new THREE.PerspectiveCamera(45,1,0.01,100);
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener("resize",resize);resize();

const H=1/CFG.aspect;
const loader=new THREE.TextureLoader();
const tex=s=>{const t=loader.load(s);t.colorSpace=THREE.SRGBColorSpace;return t;};
const layers=CFG.layers.map((cfg,i)=>{
 const mat=new THREE.MeshBasicMaterial({map:tex(cfg.src),transparent:true,depthTest:false,depthWrite:false});
 const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,H),mat);mesh.renderOrder=i;scene.add(mesh);
 const L={key:cfg.key,mesh,mat,z:cfg.z||0,salida:cfg.salida||0,col:new THREE.Color()};
 if(cfg.srcApagada){const m2=new THREE.MeshBasicMaterial({map:tex(cfg.srcApagada),transparent:true,depthTest:false,depthWrite:false});
  const mesh2=new THREE.Mesh(new THREE.PlaneGeometry(1,H),m2);mesh2.renderOrder=i;mesh.add(mesh2);L.matAlt=m2;}
 return L;});
const velasMesh=layers.find(l=>l.key==='velas').mesh;
function makeGlow(){const s=64,cv=document.createElement("canvas");cv.width=cv.height=s;const g=cv.getContext("2d");
 const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,"rgba(255,255,255,1)");
 gr.addColorStop(0.35,"rgba(255,190,110,0.55)");gr.addColorStop(1,"rgba(255,150,60,0)");
 g.fillStyle=gr;g.fillRect(0,0,s,s);const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;}
const FYOFF=CFG.flameYOffset??0.03, FZ=CFG.flameZ??0.002, FSC=CFG.flameScale??1.0;
const flames=(CFG.flames||[]).map((f,i)=>{
 const uniforms={uTime:{value:0},uSeed:{value:i*3.17+0.5},uAlive:{value:0}};
 const fmat=new THREE.ShaderMaterial({vertexShader:FLAME_VERT,fragmentShader:FLAME_FRAG,uniforms,transparent:true,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false});
 const fmesh=new THREE.Mesh(new THREE.PlaneGeometry(0.16*FSC,0.22*FSC),fmat);fmesh.position.set(f.x,f.y+FYOFF,FZ);fmesh.renderOrder=20;velasMesh.add(fmesh);
 const gmat=new THREE.SpriteMaterial({map:makeGlow(),color:0xffb45a,transparent:true,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false,opacity:0});
 const glow=new THREE.Sprite(gmat);glow.position.set(f.x,f.y+FYOFF-0.02,FZ+0.001);glow.scale.set(0.24*FSC,0.24*FSC,1);glow.renderOrder=19;velasMesh.add(glow);
 return{uniforms,glow,fmesh};});
const _bq=new THREE.Quaternion();  // billboard de las llamas

let mode="recta", modeStart=0, lit=true, litMix=1, lookSide=false, sideMix=0;
const clock=new THREE.Clock();

// Transform de la capa Virgen (salida) según el modo
function virgen(L,now,mt){
 const baseS=(D0-L.z)/D0, A=L.salida||0.10;
 let py=0, pz=L.z, s=baseS;
 // La oscilación usa mt (tiempo desde que se eligió el modo), así cada modo
 // arranca desde el REPOSO (out=0) y no brinca al seleccionarlo.
 const osc=0.5-0.5*Math.cos(mt*0.7);           // 0..1 ida y vuelta (loop)
 if(mode==="diagonal"){const out=osc*A; py=out*0.65; pz=L.z+out; s=baseS*(1+out*0.9);}  // sube notablemente al adelantarse
 else if(mode==="recta"){const out=osc*A; pz=L.z+out; s=baseS*(1+out*0.9);}
 else if(mode==="recta_queda"){const p=smooth(0,2.2,mt); const out=p*A; pz=L.z+out; s=baseS*(1+out*0.9);
   const br=0.5-0.5*Math.cos(mt*1.1); s*=1+br*0.012;}                  // respiración mínima
 else if(mode==="flota"){const p=smooth(0,1.8,mt); const out=p*A; py=Math.sin(mt*0.8)*0.02*p; pz=L.z+out; s=baseS*(1+out*0.9);}
 else if(mode==="respira"){const br=0.5-0.5*Math.cos(mt*0.9); s=baseS*(1+br*0.05);}
 return {py,pz,s};
}

renderer.setAnimationLoop(()=>{
 const now=clock.getElapsedTime(), mt=now-modeStart;
 litMix=lerp(litMix,lit?1:0,0.06);
 sideMix=lerp(sideMix,lookSide?1:0,0.05);
 const flick=0.06*(Math.sin(now*11.3)+1)/2+0.04*(Math.sin(now*17.7+1.3)+1)/2+0.03*(Math.sin(now*29.1+2.7)+1)/2;
 for(const L of layers){
  if(L.matAlt){L.mat.opacity=litMix;L.matAlt.opacity=1-litMix;}else{L.mat.opacity=1;}
  let py=0,pz=L.z,s=(D0-L.z)/D0;
  if(L.salida){const v=virgen(L,now,mt);
   // suavizado: cualquier cambio de modo se interpola, nunca salta
   if(!L.cur)L.cur={py:v.py,pz:v.pz,s:v.s};
   L.cur.py=lerp(L.cur.py,v.py,0.12);L.cur.pz=lerp(L.cur.pz,v.pz,0.12);L.cur.s=lerp(L.cur.s,v.s,0.12);
   py=L.cur.py;pz=L.cur.pz;s=L.cur.s;}
  L.mesh.position.set(0,py,pz);L.mesh.scale.set(s,s,1);
  L.col.copy(UNLIT).lerp(LIT,litMix);const warm=1-flick*litMix*0.6;
  L.mat.color.setRGB(L.col.r*warm,L.col.g*warm,L.col.b*warm);
  if(L.matAlt)L.matAlt.color.setRGB(L.col.r*warm,L.col.g*warm,L.col.b*warm);}
 velasMesh.getWorldQuaternion(_bq);_bq.invert();  // billboard de las llamas
 for(const f of flames){f.uniforms.uTime.value=now;f.uniforms.uAlive.value=litMix;
  f.fmesh.quaternion.copy(camera.quaternion).premultiply(_bq);  // la llama mira a la cámara → sobre la punta desde todo ángulo
  f.glow.material.opacity=litMix*(0.55+flick*3.0);const gs=0.24*(0.92+flick*1.4);f.glow.scale.set(gs,gs,1);}
 // cámara: de frente, o un leve vaivén lateral para mostrar el parallax
 const ang=sideMix*(Math.sin(now*0.5)*0.35);
 camera.position.set(Math.sin(ang)*D0,0,Math.cos(ang)*D0);camera.lookAt(0,0,0);
 renderer.render(scene,camera);
});

// UI
const btns=[...document.querySelectorAll("#ui button")];
function setMode(m){mode=m;modeStart=clock.getElapsedTime();document.getElementById("modo").textContent=m.replace("_"," ");
 btns.forEach(b=>b.classList.toggle("on",b.dataset.m===m));}
btns.forEach(b=>b.addEventListener("click",()=>setMode(b.dataset.m)));
setMode("flota");   // la elegida por el equipo — abre directo en esta
document.getElementById("btn-vela").addEventListener("click",e=>{lit=!lit;e.target.textContent=lit?"Apagar velas":"Encender velas";});
document.getElementById("btn-lado").addEventListener("click",e=>{lookSide=!lookSide;e.target.textContent=lookSide?"Ver de frente":"Ver de lado";});
</script>
</body>
</html>
