<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Dolorosa · ajustar a mano</title>
<style>:root{font-family:system-ui,sans-serif}*{box-sizing:border-box;margin:0}
html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden;touch-action:none}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
#hint{position:fixed;left:0;right:0;top:0;z-index:5;text-align:center;padding:8px 12px;font-size:12px;opacity:.9;background:linear-gradient(#000c,#0000);pointer-events:none}
#hint b{color:#c9a24b}
#top{position:fixed;right:8px;top:38px;z-index:6;display:flex;flex-direction:column;gap:6px}
#top button{pointer-events:auto;background:#171320ee;color:#f4efe6;border:1px solid #ffffff22;border-radius:10px;padding:8px 10px;font-size:12px}
#top button.on{background:#c9a24b;color:#1a1206;border-color:#c9a24b}
.panel{position:fixed;left:0;right:0;bottom:0;z-index:6;background:#0b0910f2;border-top:1px solid #ffffff22;padding:8px 10px calc(8px + env(safe-area-inset-bottom));max-height:52vh;overflow:auto}
.row{display:flex;align-items:center;gap:8px;margin:5px 0}
.row label{flex:0 0 118px;font-size:12px;opacity:.9}
.row input[type=range]{flex:1}
.row .v{flex:0 0 58px;text-align:right;font-size:12px;color:#c9a24b;font-weight:700;font-variant-numeric:tabular-nums}
.btns{display:flex;gap:8px;justify-content:center;margin-top:8px}
.btns button{background:#221c30;color:#f4efe6;border:1px solid #ffffff33;border-radius:9px;padding:10px 16px;font-size:13px;min-width:110px}
.btns button:active{background:#3a2f52}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head><body>
<canvas id="c"></canvas>
<div id="hint">Arrastra la pintura para <b>girarla</b> (mira los ángulos extremos) · ajusta los sliders · toca <b>Copiar</b></div>
<div id="top">
  <button id="tvelas" class="on">Velas encendidas</button>
  <button id="tbob">Animar salida</button>
  <button id="tfront">Ver de frente</button>
</div>
<div class="panel">
  <div class="row"><label>Virgen adelante</label><input id="s_salida" type="range" min="0" max="0.35" step="0.005"><span class="v" id="v_salida"></span></div>
  <div class="row"><label>Fuego altura</label><input id="s_fy" type="range" min="-0.06" max="0.14" step="0.002"><span class="v" id="v_fy"></span></div>
  <div class="row"><label>Fuego tamaño</label><input id="s_fsc" type="range" min="0.5" max="1.8" step="0.02"><span class="v" id="v_fsc"></span></div>
  <div class="row"><label>Fuego profundidad</label><input id="s_fz" type="range" min="-0.03" max="0.04" step="0.002"><span class="v" id="v_fz"></span></div>
  <div class="row"><label>Llama izq ← →</label><input id="s_fx0" type="range" min="-0.55" max="-0.30" step="0.002"><span class="v" id="v_fx0"></span></div>
  <div class="row"><label>Llama der ← →</label><input id="s_fx1" type="range" min="0.28" max="0.52" step="0.002"><span class="v" id="v_fx1"></span></div>
  <div class="btns"><button id="reset">↺ Original</button><button id="copy">⧉ Copiar</button></div>
</div>
<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG=window.MUSEO_CONFIG;
const clamp=(v,a,b)=>Math.min(b,Math.max(a,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const LIT=new THREE.Color(1.00,0.96,0.90), UNLIT=new THREE.Color(0.50,0.55,0.72);
const FLAME_VERT=`varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
const FLAME_FRAG=`precision highp float;varying vec2 vUv;uniform float uTime;uniform float uSeed;uniform float uAlive;
float hash(float n){return fract(sin(n)*43758.5453123);}
float vnoise(float x){float i=floor(x),f=fract(x);return mix(hash(i),hash(i+1.0),f*f*(3.0-2.0*f));}
void main(){vec2 uv=vUv-vec2(0.5,0.42);float t=uTime+uSeed*10.0;
float sway=(vnoise(t*2.7)-0.5)*0.42;uv.x-=sway*clamp(uv.y+0.15,0.0,1.0);
float h=0.34+vnoise(t*4.3+5.0)*0.12;
float w=0.115*(1.0-clamp(uv.y/h,0.0,1.0))*(1.0-clamp(uv.y/h,0.0,1.0));
float side=1.0-smoothstep(0.0,max(w,0.001),abs(uv.x));
float vmask=smoothstep(-0.12,-0.04,uv.y)*(1.0-smoothstep(h*0.5,h,uv.y));
float body=side*vmask;
vec3 col=mix(vec3(1.0,0.98,0.75),vec3(1.0,0.55,0.12),smoothstep(-0.05,0.14,uv.y));
col=mix(col,vec3(1.0,0.28,0.06),smoothstep(0.12,0.30,uv.y));
float breathe=0.82+vnoise(t*7.0)*0.36;float a=body*breathe*uAlive;gl_FragColor=vec4(col*a,a);}`;

// --- valores en vivo (arrancan en los del config) ---
const D0=CFG.nominalDistance||2.0, H=1/CFG.aspect;
const DEF={salida:(CFG.layers.find(l=>l.salida)||{}).salida||0.15,
  fy:CFG.flameYOffset??0.03, fsc:CFG.flameScale??1.0, fz:CFG.flameZ??0.002,
  fx0:CFG.flames[0].x, fx1:CFG.flames[1].x};
const P={...DEF};

const canvas=document.getElementById("c");
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio||1,2));renderer.outputColorSpace=THREE.SRGBColorSpace;
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,1,0.01,100);
function resize(){renderer.setSize(innerWidth,innerHeight);camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}
addEventListener("resize",resize);resize();

const loader=new THREE.TextureLoader();const tx=s=>{const t=loader.load(s);t.colorSpace=THREE.SRGBColorSpace;return t;};
const layers=CFG.layers.map((cfg,i)=>{
  const mat=new THREE.MeshBasicMaterial({map:tx(cfg.src),transparent:true,depthTest:false,depthWrite:false});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1,H),mat);mesh.renderOrder=i;scene.add(mesh);
  const L={key:cfg.key,mesh,mat,z:cfg.z||0,salida:cfg.salida||0,col:new THREE.Color()};
  if(cfg.srcApagada){const m2=new THREE.MeshBasicMaterial({map:tx(cfg.srcApagada),transparent:true,depthTest:false,depthWrite:false});
    const mesh2=new THREE.Mesh(new THREE.PlaneGeometry(1,H),m2);mesh2.renderOrder=i;mesh.add(mesh2);L.matAlt=m2;}
  return L;});
const velasMesh=layers.find(l=>l.key==='velas').mesh;
function makeGlow(){const s=64,cv=document.createElement("canvas");cv.width=cv.height=s;const g=cv.getContext("2d");
  const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);gr.addColorStop(0,"rgba(255,255,255,1)");
  gr.addColorStop(0.35,"rgba(255,190,110,0.55)");gr.addColorStop(1,"rgba(255,150,60,0)");
  g.fillStyle=gr;g.fillRect(0,0,s,s);const t=new THREE.CanvasTexture(cv);t.colorSpace=THREE.SRGBColorSpace;return t;}
const flames=CFG.flames.map((f,i)=>{
  const uniforms={uTime:{value:0},uSeed:{value:i*3.17+0.5},uAlive:{value:1}};
  const fmat=new THREE.ShaderMaterial({vertexShader:FLAME_VERT,fragmentShader:FLAME_FRAG,uniforms,transparent:true,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false});
  const fmesh=new THREE.Mesh(new THREE.PlaneGeometry(0.16,0.22),fmat);fmesh.renderOrder=20;velasMesh.add(fmesh);
  const gmat=new THREE.SpriteMaterial({map:makeGlow(),color:0xffb45a,transparent:true,blending:THREE.AdditiveBlending,depthTest:false,depthWrite:false,opacity:0});
  const glow=new THREE.Sprite(gmat);glow.renderOrder=19;velasMesh.add(glow);
  return{uniforms,fmat,gmat,glow,fmesh,baseY:f.y};});
const _bq=new THREE.Quaternion();

// --- órbita de cámara (arrastrar) ---
let az=0, el=0, front=false;
const pts=new Map();
canvas.addEventListener("pointerdown",e=>{canvas.setPointerCapture(e.pointerId);pts.set(e.pointerId,{x:e.clientX,y:e.clientY});});
canvas.addEventListener("pointermove",e=>{if(!pts.has(e.pointerId))return;const p=pts.get(e.pointerId);
  az=clamp(az+(e.clientX-p.x)*0.006,-1.2,1.2);el=clamp(el-(e.clientY-p.y)*0.006,-0.9,0.9);front=false;
  document.getElementById("tfront").classList.remove("on");pts.set(e.pointerId,{x:e.clientX,y:e.clientY});});
const up=e=>pts.delete(e.pointerId);canvas.addEventListener("pointerup",up);canvas.addEventListener("pointercancel",up);

let lit=true,litMix=1,bob=false;
const clock=new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const now=clock.getElapsedTime();
  litMix=lerp(litMix,lit?1:0,0.08);
  if(front){az=lerp(az,0,0.1);el=lerp(el,0,0.1);}
  const flick=0.06*(Math.sin(now*11.3)+1)/2+0.04*(Math.sin(now*17.7+1.3)+1)/2+0.03*(Math.sin(now*29.1+2.7)+1)/2;
  // salida (animada opcional para ver a la Virgen adelantarse)
  const outMul=bob?(0.5-0.5*Math.cos(now*0.7)):1;
  for(const L of layers){
    if(L.matAlt){L.mat.opacity=litMix;L.matAlt.opacity=1-litMix;}else{L.mat.opacity=1;}
    const baseS=(D0-L.z)/D0;
    const out=L.salida?P.salida*outMul:0;
    const s=baseS*(1+out*0.9);
    const py=(L.salida&&bob)?Math.sin(now*0.8)*0.02*outMul:0;
    L.mesh.position.set(0,py,L.z+out);L.mesh.scale.set(s,s,1);
    L.col.copy(UNLIT).lerp(LIT,litMix);const warm=1-flick*litMix*0.6;
    L.mat.color.setRGB(L.col.r*warm,L.col.g*warm,L.col.b*warm);
    if(L.matAlt)L.matAlt.color.setRGB(L.col.r*warm,L.col.g*warm,L.col.b*warm);}
  // fuego (posición/escala en vivo desde los sliders)
  velasMesh.getWorldQuaternion(_bq);_bq.invert();
  const fxs=[P.fx0,P.fx1];
  flames.forEach((f,i)=>{
    f.uniforms.uTime.value=now;f.uniforms.uAlive.value=litMix;
    f.fmesh.position.set(fxs[i],f.baseY+P.fy,P.fz);
    f.fmesh.scale.set(P.fsc,P.fsc,1);
    f.fmesh.quaternion.copy(camera.quaternion).premultiply(_bq);
    f.glow.position.set(fxs[i],f.baseY+P.fy-0.02,P.fz+0.001);
    const gs=0.24*P.fsc*(0.92+flick*1.4);f.glow.scale.set(gs,gs,1);
    f.glow.material.opacity=litMix*(0.55+flick*3.0);
    f.fmat.visible=litMix>0.02;f.gmat.visible=litMix>0.02;});
  camera.position.set(Math.cos(el)*Math.sin(az)*D0,Math.sin(el)*D0,Math.cos(el)*Math.cos(az)*D0);
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
});

// --- sliders ---
const S=[["salida","s_salida","v_salida",3],["fy","s_fy","v_fy",3],["fsc","s_fsc","v_fsc",2],
  ["fz","s_fz","v_fz",3],["fx0","s_fx0","v_fx0",3],["fx1","s_fx1","v_fx1",3]];
function refresh(){for(const[k,sid,vid,d]of S){document.getElementById(sid).value=P[k];document.getElementById(vid).textContent=(+P[k]).toFixed(d);}}
for(const[k,sid,vid,d]of S){document.getElementById(sid).addEventListener("input",e=>{P[k]=+e.target.value;document.getElementById(vid).textContent=P[k].toFixed(d);});}
refresh();

document.getElementById("tvelas").addEventListener("click",e=>{lit=!lit;e.target.textContent=lit?"Velas encendidas":"Velas apagadas";e.target.classList.toggle("on",lit);});
document.getElementById("tbob").addEventListener("click",e=>{bob=!bob;e.target.classList.toggle("on",bob);});
document.getElementById("tfront").addEventListener("click",e=>{front=!front;e.target.classList.toggle("on",front);});
document.getElementById("reset").addEventListener("click",()=>{Object.assign(P,DEF);refresh();});
const copyBtn=document.getElementById("copy");let ct=0;
copyBtn.addEventListener("click",async()=>{
  const f=(v,d)=>+(+v).toFixed(d);
  const txt=`dolorosa → salida: ${f(P.salida,3)} · flameYOffset: ${f(P.fy,3)} · flameScale: ${f(P.fsc,2)} · flameZ: ${f(P.fz,3)} · fuegoIzqX: ${f(P.fx0,3)} · fuegoDerX: ${f(P.fx1,3)}`;
  try{await navigator.clipboard.writeText(txt);}catch{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();}
  copyBtn.textContent="✓ copiado";clearTimeout(ct);ct=setTimeout(()=>copyBtn.textContent="⧉ Copiar",1500);
});
</script>
</body></html>
