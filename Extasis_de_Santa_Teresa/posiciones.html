<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Santa Teresa · posiciones a mano</title>
<style>:root{font-family:system-ui,sans-serif}*{box-sizing:border-box;margin:0}
html,body{height:100%;background:#0d0b12;color:#f4efe6;overflow:hidden;touch-action:none}
#c{position:fixed;inset:0;width:100%;height:100%;display:block}
#hint{position:fixed;left:0;right:0;top:0;z-index:5;text-align:center;padding:7px 12px;font-size:12px;opacity:.9;background:linear-gradient(#000c,#0000);pointer-events:none}
#hint b{color:#c9a24b}
#sel{position:fixed;left:6px;right:6px;top:32px;z-index:6;display:flex;flex-wrap:wrap;gap:4px;justify-content:center}
#sel button{background:#171320e6;color:#f4efe6;border:1px solid #ffffff22;border-radius:8px;padding:6px 8px;font-size:11px}
#sel button.on{background:#c9a24b;color:#1a1206;border-color:#c9a24b}
#pill{position:fixed;left:8px;top:92px;z-index:6;background:#171320ee;border:1px solid #ffffff22;border-radius:10px;padding:7px 9px;font-size:11px;line-height:1.5;font-variant-numeric:tabular-nums}
#pill .v{color:#c9a24b;font-weight:700}
#op{position:fixed;right:8px;top:92px;z-index:6;background:#171320ee;border:1px solid #ffffff22;border-radius:10px;padding:7px 9px;font-size:10px;text-align:center}
#op input{width:84px;display:block;margin-top:5px}
.bar{position:fixed;left:0;right:0;bottom:0;z-index:6;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;padding:8px;background:#0b0910ee;border-top:1px solid #ffffff22}
.bar button{background:#221c30;color:#f4efe6;border:1px solid #ffffff33;border-radius:8px;padding:9px 11px;font-size:13px;min-width:42px}
.bar button:active{background:#3a2f52}
.grp{display:flex;gap:4px;align-items:center;background:#00000033;border-radius:8px;padding:3px}
.grp small{opacity:.7;padding:0 4px}
</style>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
</head><body>
<canvas id="c"></canvas>
<div id="hint">Elegí arriba qué mover · arrastra para <b>mover</b> · pellizca/rueda para <b>escalar</b> · <b>Copiar</b></div>
<div id="sel"></div>
<div id="pill" style="display:none"></div>
<div id="op">rayos X<input id="opac" type="range" min="0" max="100" value="60"/></div>
<div class="bar">
  <div class="grp"><small>X</small><button data-k="x" data-d="-1">◀</button><button data-k="x" data-d="1">▶</button></div>
  <div class="grp"><small>Y</small><button data-k="y" data-d="1">▲</button><button data-k="y" data-d="-1">▼</button></div>
  <div class="grp"><small>tam</small><button data-k="s" data-d="-1">−</button><button data-k="s" data-d="1">+</button></div>
  <button id="copy">⧉ Copiar</button>
</div>
<script src="config.js"></script>
<script type="module">
import * as THREE from "three";
const CFG = window.MUSEO_CONFIG;
const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
const PA = 1290/1505;                       // aspecto de la pintura (target)

// Elementos editables (id -> su cfg en el config)
const O = CFG.reversoOval;
const EL = [
  ["Rayos X", "rx", CFG.rx],
  ["Reverso óvalo", "reversoOval", O],
  // mismo óvalo, pero en su destino de la izquierda (no cambia de tamaño)
  ["Reverso izq", "reversoIzq", { src: O.src, aspect: O.aspect, width: O.width, x: O.izqX, y: O.izqY }],
  ["Reverso título", "reversoTitulo", CFG.reversoTitulo],
  ["Título micro", "microTitulo", CFG.microTitulo]
];
CFG.microscopias.forEach((m, i) => EL.push([m.titulo, "mic" + i, m]));
const P = {}; EL.forEach(([n, id, c]) => P[id] = { x: c.x, y: c.y, w: c.width, aspect: c.aspect, src: c.src });
let mode = "rx";
const NUDGE = { x: 0.004, y: 0.004, s: 0.008 };

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2)); renderer.outputColorSpace = THREE.SRGBColorSpace;
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, 1, 0.01, 100);
let VW = 1, VH = 1;
function resize() {
  renderer.setSize(innerWidth, innerHeight); const a = innerWidth / innerHeight;
  camera.aspect = a; camera.updateProjectionMatrix();
  const need = 2.6, hV = Math.tan(THREE.MathUtils.degToRad(40) / 2);
  const dz = (a >= 1 ? need / 2 / (hV * a) : need / 2 / hV);
  camera.position.set(0, 0, Math.max(2.4, dz)); camera.lookAt(0, 0, 0);
  VH = 2 * hV * camera.position.z; VW = VH * a;
}
addEventListener("resize", resize); resize();
const loader = new THREE.TextureLoader();
const tx = (s) => { const t = loader.load(s); t.colorSpace = THREE.SRGBColorSpace; return t; };

// pintura real de referencia
const pint = new THREE.Mesh(new THREE.PlaneGeometry(1, 1/PA),
  new THREE.MeshBasicMaterial({ map: tx(CFG.targetPreview), depthTest: false, depthWrite: false }));
pint.renderOrder = 0; scene.add(pint);

const M = {};
EL.forEach(([n, id, c], i) => {
  const mat = new THREE.MeshBasicMaterial({ map: tx(c.src), transparent: true, opacity: id === "rx" ? 0.6 : 1, depthTest: false, depthWrite: false });
  const me = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), mat);
  me.renderOrder = 1 + i; scene.add(me); M[id] = { me, mat };
});
const ring = new THREE.Mesh(new THREE.RingGeometry(0.5, 0.53, 4).rotateZ(Math.PI/4),
  new THREE.MeshBasicMaterial({ color: 0xffd24b, transparent: true, opacity: 0.9, side: THREE.DoubleSide, depthTest: false }));
ring.renderOrder = 99; scene.add(ring);

const selDiv = document.getElementById("sel");
EL.forEach(([name, id]) => {
  const b = document.createElement("button"); b.textContent = name; b.dataset.id = id;
  b.className = id === mode ? "on" : "";
  b.addEventListener("click", () => { mode = id; [...selDiv.children].forEach(x => x.classList.toggle("on", x.dataset.id === mode)); apply(); });
  selDiv.appendChild(b);
});

function apply() {
  // el óvalo y su destino izq son la MISMA imagen: el tamaño queda bloqueado
  if (mode === "reversoOval") P.reversoIzq.w = P.reversoOval.w;
  if (mode === "reversoIzq") P.reversoOval.w = P.reversoIzq.w;
  EL.forEach(([n, id], i) => { const p = P[id]; M[id].me.scale.set(p.w, p.w / p.aspect, 1); M[id].me.position.set(p.x, p.y, 0.01 + i * 0.002); });
  const p = P[mode]; const r = Math.max(p.w, p.w / p.aspect) * 0.6;
  ring.position.set(p.x, p.y, 0.2); ring.scale.set(r / 0.515, r / 0.515, 1);
  const pill = document.getElementById("pill"); pill.style.display = "block";
  pill.innerHTML = "<b>" + EL.find(e => e[1] === mode)[0] + "</b><br>x <span class='v'>" + p.x.toFixed(3) +
    "</span> · y <span class='v'>" + p.y.toFixed(3) + "</span><br>ancho <span class='v'>" + p.w.toFixed(3) + "</span>";
}
apply();
renderer.setAnimationLoop(() => renderer.render(scene, camera));

function worldAt(px, py) { return { x: ((px / innerWidth) * 2 - 1) * VW / 2, y: (-(py / innerHeight) * 2 + 1) * VH / 2 }; }
const pts = new Map(); let pinch = 0, w0 = 0;
canvas.addEventListener("pointerdown", e => {
  canvas.setPointerCapture(e.pointerId); pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pts.size === 2) { const [a, b] = [...pts.values()]; pinch = Math.hypot(a.x - b.x, a.y - b.y); w0 = P[mode].w; }
});
canvas.addEventListener("pointermove", e => {
  if (!pts.has(e.pointerId)) return; pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (pts.size === 1) { const w = worldAt(e.clientX, e.clientY); P[mode].x = clamp(w.x, -2, 2); P[mode].y = clamp(w.y, -2, 2); apply(); }
  if (pts.size === 2) { const [a, b] = [...pts.values()]; const d = Math.hypot(a.x - b.x, a.y - b.y); if (pinch > 0) { P[mode].w = clamp(w0 * d / pinch, 0.05, 3); apply(); } }
});
const up = e => { pts.delete(e.pointerId); if (pts.size < 2) pinch = 0; };
canvas.addEventListener("pointerup", up); canvas.addEventListener("pointercancel", up);
canvas.addEventListener("wheel", e => { e.preventDefault(); P[mode].w = clamp(P[mode].w * (1 - e.deltaY * 0.0012), 0.05, 3); apply(); }, { passive: false });
document.querySelectorAll(".bar button[data-k]").forEach(b => b.addEventListener("click", () => {
  const k = b.dataset.k, d = +b.dataset.d;
  if (k === "x") P[mode].x += d * NUDGE.x;
  if (k === "y") P[mode].y += d * NUDGE.y;
  if (k === "s") P[mode].w = clamp(P[mode].w + d * NUDGE.s, 0.05, 3);
  apply();
}));
document.getElementById("opac").addEventListener("input", e => { M.rx.mat.opacity = e.target.value / 100; });

const copyBtn = document.getElementById("copy"); let ct = 0;
copyBtn.addEventListener("click", async () => {
  const f = v => +(+v).toFixed(3);
  const one = (id, c) => '{ src: "' + c.src + '", aspect: ' + c.aspect + ', width: ' + f(P[id].w) + ', x: ' + f(P[id].x) + ', y: ' + f(P[id].y) + ' }';
  const micLines = CFG.microscopias.map((m, i) =>
    '    { src: "' + m.src + '", zoom: "' + m.zoom + '", aspect: ' + m.aspect + ', width: ' + f(P["mic" + i].w) + ', x: ' + f(P["mic" + i].x) + ', y: ' + f(P["mic" + i].y) +
    ', titulo: "' + m.titulo + '", pigmento: "' + m.pigmento + '", formula: "' + m.formula + '", nota: "' + m.nota + '" }').join(",\n");
  const txt = "rx: " + one("rx", CFG.rx) + ",\n" +
    'reversoOval: { src: "' + O.src + '", aspect: ' + O.aspect + ', width: ' + f(P.reversoOval.w) +
      ', x: ' + f(P.reversoOval.x) + ', y: ' + f(P.reversoOval.y) +
      ', izqX: ' + f(P.reversoIzq.x) + ', izqY: ' + f(P.reversoIzq.y) + ' },\n' +
    "reversoTitulo: " + one("reversoTitulo", CFG.reversoTitulo) + ",\n" +
    "microTitulo: " + one("microTitulo", CFG.microTitulo) + ",\n" +
    "microscopias: [\n" + micLines + "\n]";
  try { await navigator.clipboard.writeText(txt); }
  catch { const ta = document.createElement("textarea"); ta.value = txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); }
  copyBtn.textContent = "✓ copiado"; clearTimeout(ct); ct = setTimeout(() => copyBtn.textContent = "⧉ Copiar", 1500);
});
</script>
</body></html>
